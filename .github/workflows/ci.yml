name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Tests
        run: uv run pytest

      - name: Lint
        run: uvx ruff check .

  image:
    name: Build overlay image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t agent-harness:ci .

      - name: Publish to GHCR (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          tag="sha-$(git rev-parse --short HEAD)"
          for ref in "ghcr.io/orq-ai/agent-harness:${tag}" "ghcr.io/orq-ai/agent-harness:latest"; do
            docker tag agent-harness:ci "$ref"
            docker push "$ref"
          done
          echo "Published ghcr.io/orq-ai/agent-harness:${tag}"
